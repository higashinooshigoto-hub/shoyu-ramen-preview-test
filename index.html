<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Preview</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="hero">
        <div>
          <p id="productEyebrow" class="eyebrow">【ノベルティのお菓子屋さん】</p>
          <h1 id="productTitle">Product Preview</h1>
          <p id="productLead" class="lead"></p>
        </div>
      </header>

      <main class="layout">
        <section id="controlsPanel" class="panel controls"></section>

        <section class="panel stage-panel">
          <div class="canvas-shell">
            <canvas id="stageCanvas" width="1200" height="1200"></canvas>
          </div>
          <p id="stageNote" class="stage-note"></p>
        </section>
      </main>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
