<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Preview</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="site-header">
        <div class="brand-ribbon">
          <div class="brand-ribbon__top"></div>
          <div class="brand-ribbon__body">
            <div class="brand-ribbon__inner">
              <img class="brand-logo" src="./assets/noveoka-logo.png" alt="" />
              <div class="brand-copy">
                <p class="brand-title">Noveoka Design Viewer</p>
                <p class="brand-subtitle">ノベルティのお菓子屋さん　ノベオカデザインビューワー</p>
              </div>
            </div>
          </div>
        </div>
        <div class="product-header">
          <h1 id="productTitle">Product Preview</h1>
        </div>
      </header>

      <main class="layout">
        <section id="controlsPanel" class="panel controls"></section>

        <section class="panel stage-panel">
          <div class="canvas-shell">
            <canvas id="stageCanvas" width="1200" height="1200"></canvas>
          </div>
          <p id="stageNote" class="stage-note"></p>
        </section>
      </main>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
